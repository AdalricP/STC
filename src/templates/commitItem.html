<li class="stc-commit-item Box-row Box-row--focus-gray js-navigation-item">
  <div class="stc-commit-item__main">
    <p class="stc-commit-item__message">
      <a class="Link--primary text-bold js-navigation-open markdown-title" data-slot="commitMessage" data-pjax="true" href="">Loading...</a>
    </p>

    <div class="stc-commit-item__meta">
      <div class="AvatarStack flex-self-start">
        <div class="AvatarStack-body" data-slot="avatarBody" aria-label="">
          <a class="avatar avatar-user" style="width:20px;height:20px;" data-skip-pjax="true" data-hovercard-type="user" data-slot="hoverCard" href="">
            <img width="20" height="20" alt="" class="avatar-user" data-slot="avatarImage" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
          </a>
        </div>
      </div>

      <div class="stc-commit-item__author f6 color-fg-muted min-width-0">
        <a class="commit-author user-mention" data-slot="viewAllCommits">Loading</a>
        committed
        <relativetime data-slot="relativeTime" class="no-wrap">...</relativetime>
      </div>

      <div class="stc-commit-item__branches" data-slot="branchTags"></div>
    </div>
  </div>

  <div class="stc-commit-item__actions d-none d-md-block flex-shrink-0">
    <div data-view-component="true" class="BtnGroup">
      <button aria-label="Copy the full SHA" type="button" data-view-component="true" class="tooltipped tooltipped-sw btn-outline btn BtnGroup-item px-0">
        <clipboard-copy aria-label="Copy the full SHA" value="" data-view-component="true" class="px-3 py-2" tabindex="0" role="button" data-slot="copyFullSHA">
          <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true" class="octicon octicon-copy">
            <path fill-rule="evenodd" d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"></path>
            <path fill-rule="evenodd" d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"></path>
          </svg>
        </clipboard-copy>
      </button>
      <a href="" aria-label="View commit details" data-view-component="true" class="tooltipped tooltipped-sw btn-outline btn BtnGroup-item text-mono f6" data-slot="commitLink"></a>
    </div>
    <div data-view-component="true" class="BtnGroup">
      <a href="" aria-label="Browse the repository at this point in the history" data-view-component="true" class="tooltipped tooltipped-sw btn-outline btn BtnGroup-item" data-slot="commitTreeLink">
        <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true" class="octicon octicon-code">
          <path fill-rule="evenodd" d="M4.72 3.22a.75.75 0 011.06 1.06L2.06 8l3.72 3.72a.75.75 0 11-1.06 1.06L.47 8.53a.75.75 0 010-1.06l4.25-4.25zm6.56 0a.75.75 0 10-1.06 1.06L13.94 8l-3.72 3.72a.75.75 0 101.06 1.06l4.25-4.25a.75.75 0 000-1.06l-4.25-4.25z"></path>
        </svg>
      </a>
    </div>
  </div>
</li>
